<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Richiesta inviata</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      max-width: 500px;
      padding: 40px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
    }

    h1 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    p {
      color: #ccc;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    a {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 14px;
      background: #ef4444;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>🔥 Richiesta inviata</h1>
    <p>Abbiamo ricevuto il tuo messaggio. Ti risponderemo il prima possibile.</p>
    <a href="index.html">Torna al sito</a>
  </div>

</body>
</html>
